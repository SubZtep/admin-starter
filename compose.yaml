services:
  db:
    image: postgres:18-alpine
    ports:
      - "5433:5432"
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: test
    volumes:
      - ./pgdata:/var/lib/postgresql
      - ./apps/api/better-auth_migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "testuser", "-d", "postgres"]
      interval: 3s

  mail:
    image: maildev/maildev
    restart: unless-stopped
    ports:
      - "1080:1080"
      - "1025:1025" # expose SMTP to host
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:1080",
        ]
      interval: 3s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
      mail:
        condition: service_healthy
    env_file:
      - apps/api/.env
      - apps/api/.env.local
    environment:
      DATABASE_URL: postgresql://testuser:testpass@db:5432/test
      SMTP_HOST: mail

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_APP_URL: ${VITE_APP_URL:-http://localhost:3000}
    ports:
      - "3000:3000"
    depends_on:
      - api
    env_file: apps/web/.env
    environment:
      API_URL: http://api:3001
