services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - CORS_ORIGIN=http://localhost:3000

  web:
    build:
      context: ./apps/web
    ports:
      - "3000:3000"
    depends_on:
      - api

