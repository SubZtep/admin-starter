changelog:
  exclude:
    labels:
      - ignore-for-release
    authors:
      - octocat
  categories:
    - title: Breaking Changes 🛠
      labels:
        - Semver-Major
        - breaking-change
    - title: Exciting New Features 🎉
      labels:
        - Semver-Minor
        - enhancement
    - title: 🏕 Features
      labels:
        - '*'
      exclude:
        labels:
          - dependencies
          - Semver-Major
          - breaking-change
          - Semver-Minor
          - enhancement
    - title: 👒 Dependencies
      labels:
        - dependencies
