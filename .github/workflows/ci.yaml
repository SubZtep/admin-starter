name: Continuous Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Biome Toolchain
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51
        with:
          version: "2.4.9"

      - name: Run linter and formatter
        run: biome ci .

  test:
    if: false
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6
        with:
          bun-version: latest

      - name: Setup PostgreSQL
        uses: Harmon758/postgresql-action@0be19fa37850b22cb4c9bbf28a03abbf44abd863
        with:
          postgresql version: 18-alpine
          postgresql user: testuser
          postgresql password: testpass
          postgresql db: test

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/test
        run: cd apps/api && bunx auth@latest migrate --yes

      - name: Run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/test
        run: cd apps/api && bun test
