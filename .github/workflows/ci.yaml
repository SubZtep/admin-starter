name: Continuous Integration

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Biome Toolchain
        uses: biomejs/setup-biome@v2
        with:
          version: "2.4.6"

      - name: Run linter and formatter
        run: biome ci .

  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup PostgreSQL
        uses: Harmon758/postgresql-action@v1
        with:
          postgresql version: 18-alpine
          postgresql user: testuser
          postgresql password: testpass
          postgresql db: test

      - name: Install dependencies
        run: bun install

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/test
        run: cd apps/api && bunx auth@latest migrate --yes

      - name: Run tests
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5432/test
        run: cd apps/api && bun test
