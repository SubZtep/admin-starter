name: Continuous Integration

on:
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

jobs:
  lint:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Biome Toolchain
        uses: biomejs/setup-biome@4c91541eaada48f67d7dbd7833600ce162b68f51

      - name: Run linter and formatter
        run: biome ci .

  test:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://testuser:testpass@127.0.0.1:5432/test
      # Dummy secrets — only used to satisfy startup validation during tests.
      BETTER_AUTH_SECRET: ci_better_auth_secret_at_least_32_chars_long
      JWT_SECRET: ci_jwt_secret_at_least_32_chars_long_______
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout Repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6

      - name: Install dependencies
        run: bun install

      - name: Apply SQL migrations
        run: |
          printf '%s\n' apps/api/better-auth_migrations/*.sql | LC_ALL=C sort | while read -r f; do
            echo "applying $f"
            psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"
          done

      - name: Run tests
        run: bun run test
