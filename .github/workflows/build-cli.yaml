name: Build CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        type: string

env:
  BINARY_NAME: kaja

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            bun_target: bun-linux-x64
            artifact: kaja-linux-x64
          - os: ubuntu-latest
            platform: linux-arm64
            bun_target: bun-linux-arm64
            artifact: kaja-linux-arm64
          - os: ubuntu-latest
            platform: windows-x64
            bun_target: bun-windows-x64
            artifact: kaja-windows-x64.exe
          - os: macos-latest
            platform: macos-arm64
            bun_target: bun-darwin-arm64
            artifact: kaja-macos-arm64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build CLI for ${{ matrix.platform }}
        shell: bash
        env:
          API_URL: ${{ vars.API_URL }}
        run: |
          if [ -z "${API_URL}" ]; then
            echo "Set the API_URL repository variable (Settings → Secrets and variables → Actions → Variables)."
            exit 1
          fi
          cd apps/cli
          bun build ./cli.ts --compile --minify --sourcemap --bytecode --outfile kaja --env=API_* --target="${{ matrix.bun_target }}"

      - name: Rename artifact
        shell: bash
        run: |
          out="${{ matrix.artifact }}"
          if [[ -f "apps/cli/kaja.exe" ]]; then
            mv "apps/cli/kaja.exe" "$out"
          elif [[ -f "apps/cli/kaja" ]]; then
            mv "apps/cli/kaja" "$out"
          else
            echo "Expected kaja or kaja.exe in apps/cli"
            ls -la apps/cli/ || true
            exit 1
          fi
          chmod +x "$out" || true

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          sha256sum "${{ matrix.artifact }}" | awk '{print $1}' > "${{ matrix.artifact }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          retention-days: 30

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Determine version
        id: version
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${INPUT_TAG}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "❌ VERSION is empty"
            exit 1
          fi

          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Create manifest.json
        shell: bash
        run: |
          BASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/download/${VERSION}"

          cat > artifacts/manifest.json <<EOF
          {
            "version": "${VERSION}",
            "base_url": "${BASE_URL}",
            "platforms": {
              "linux-x64": {
                "artifact": "kaja-linux-x64",
                "checksum": ""
              },
              "linux-arm64": {
                "artifact": "kaja-linux-arm64",
                "checksum": ""
              },
              "macos-arm64": {
                "artifact": "kaja-macos-arm64",
                "checksum": ""
              },
              "windows-x64": {
                "artifact": "kaja-windows-x64.exe",
                "checksum": ""
              }
            }
          }
          EOF

          shopt -s nullglob
          for artifact in artifacts/*/kaja-*; do
            [[ -f "$artifact" ]] || continue
            [[ "$artifact" == *.sha256 ]] && continue
            name=$(basename "$artifact")
            if [[ ! -f "${artifact}.sha256" ]]; then
              echo "❌ Missing sidecar: ${artifact}.sha256"
              exit 1
            fi
            checksum=$(tr -d '\n' < "${artifact}.sha256")

            case "$name" in
              kaja-linux-x64)   key=linux-x64 ;;
              kaja-linux-arm64) key=linux-arm64 ;;
              kaja-macos-arm64) key=macos-arm64 ;;
              kaja-windows-x64.exe) key=windows-x64 ;;
              *) echo "❌ Unknown artifact basename: $name"; exit 1 ;;
            esac

            jq --arg c "$checksum" --arg k "$key" '.platforms[$k].checksum=$c' artifacts/manifest.json > tmp.json && mv tmp.json artifacts/manifest.json
          done

          if jq -e '
            .platforms["linux-x64"].checksum == "" or
            .platforms["linux-arm64"].checksum == "" or
            .platforms["macos-arm64"].checksum == "" or
            .platforms["windows-x64"].checksum == ""
          ' artifacts/manifest.json > /dev/null; then
            echo "❌ Missing checksum in manifest"
            cat artifacts/manifest.json
            exit 1
          fi

          cat artifacts/manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.VERSION }}
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*/kaja-*
            artifacts/manifest.json
