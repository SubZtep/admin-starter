name: Build CLI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (e.g. v1.0.0)
        required: true
        type: string

env:
  BINARY_NAME: kaja

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            artifact: kaja-linux-x64
          - os: macos-latest
            platform: macos-arm64
            artifact: kaja-macos-arm64
          - os: windows-latest
            platform: windows-x64
            artifact: kaja-windows-x64.exe

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build CLI for ${{ matrix.platform }}
        run: bun run --filter @app/cli build

      - name: Rename artifact
        shell: bash
        run: mv apps/cli/kaja "${{ matrix.artifact }}"

      - name: Generate SHA256 checksum
        shell: bash
        run: sha256sum "${{ matrix.artifact }}" | awk '{print $1}' > "${{ matrix.artifact }}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}
            ${{ matrix.artifact }}.sha256
          retention-days: 30

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create manifest.json
        shell: bash
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ "$VERSION" == "refs/heads/"* ]; then
            VERSION="${{ inputs.tag }}"
          fi

          cat > artifacts/manifest.json << 'EOF'
          {
            "version": "VERSION_PLACEHOLDER",
            "base_url": "REPLACE_BASE_URL",
            "platforms": {
              "linux-x64": {
                "artifact": "kaja-linux-x64",
                "checksum": "CHECKSUM_PLACEHOLDER_linux"
              },
              "macos-arm64": {
                "artifact": "kaja-macos-arm64",
                "checksum": "CHECKSUM_PLACEHOLDER_macos"
              },
              "windows-x64": {
                "artifact": "kaja-windows-x64.exe",
                "checksum": "CHECKSUM_PLACEHOLDER_windows"
              }
            }
          }
          EOF

          sed -i "s/VERSION_PLACEHOLDER/$VERSION/g" artifacts/manifest.json
          sed -i "s|REPLACE_BASE_URL|${{ github.server_url }}/${{ github.repository }}/releases/download/$VERSION|g" artifacts/manifest.json

          for artifact in artifacts/*/kaja-*; do
            name=$(basename "$artifact")
            checksum=$(cat "$artifact.sha256" 2>/dev/null || echo "")
            if [[ "$name" == *"linux"* ]]; then
              sed -i "s/CHECKSUM_PLACEHOLDER_linux/$checksum/g" artifacts/manifest.json
            elif [[ "$name" == *"macos"* ]]; then
              sed -i "s/CHECKSUM_PLACEHOLDER_macos/$checksum/g" artifacts/manifest.json
            elif [[ "$name" == *"windows"* ]]; then
              sed -i "s/CHECKSUM_PLACEHOLDER_windows/$checksum/g" artifacts/manifest.json
            fi
          done

          cat artifacts/manifest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            artifacts/*/kaja-*
            artifacts/*/manifest.json