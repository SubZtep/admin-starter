name: Release to Docker Hub

on:
  workflow_dispatch:
    inputs:
      release_api:
        description: "Release API"
        type: boolean
        default: true
      release_web:
        description: "Release Web"
        type: boolean
        default: true

jobs:
  api-docker:
    name: API Build and Push
    if: ${{ inputs.release_api }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main

      - name: Get API version
        id: version
        run: |
          VERSION=$(jq -r .version ./apps/api/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🍺 Build and Push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_API }}:latest
            ${{ vars.DOCKER_IMAGE_API }}:${{ steps.version.outputs.version }}

  web-docker:
    name: Web Build and Push
    if: ${{ inputs.release_web }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: main

      - name: Get Web version
        id: version
        run: |
          VERSION=$(jq -r .version ./apps/web/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd

      - name: Login to Docker Hub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🍺 Build and Push Docker image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKER_IMAGE_WEB }}:latest
            ${{ vars.DOCKER_IMAGE_WEB }}:${{ steps.version.outputs.version }}
